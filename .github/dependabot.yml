version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
    groups:
      all:
        patterns:
          - "*"
    open-pull-requests-limit: 5
    allow:
      - dependency-type: all
    reviewers:
      - owner
    labels:
      - dependencies
      - automated

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "03:30"
    groups:
      all:
        patterns:
          - "*"
    open-pull-requests-limit: 3
    labels:
      - ci
      - automated
